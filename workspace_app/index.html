<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <title>Sales Workspace</title>
  <link rel="stylesheet" href="/mobile/workspace/static/styles.css?v=20260625-actioncal2" />
</head>
<body>
  <section id="workspaceLogin" class="workspace-login hidden">
    <form id="workspaceLoginForm" class="workspace-login-card" autocomplete="on">
      <p class="eyebrow">Sales Intelligence</p>
      <h1>로그인</h1>
      <label for="workspaceUsername">아이디</label>
      <input id="workspaceUsername" name="username" value="admin" autocomplete="username" />
      <label for="workspacePassword">비밀번호</label>
      <input id="workspacePassword" name="password" type="password" autocomplete="current-password" />
      <button type="submit" class="small-primary">로그인</button>
      <p id="workspaceLoginError" class="error"></p>
    </form>
  </section>

  <div class="app-layout">

    <!-- ── 사이드바 ── -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><rect width="22" height="22" rx="6" fill="#10a37f"/><path d="M6 11h10M11 6v10" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>
          <span>Sales Intel</span>
        </div>
        <button class="sidebar-close" id="sidebarClose" aria-label="닫기">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 2l12 12M14 2L2 14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section-label">메인</div>
        <button class="nav-item active" data-view="dashboard">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none"><rect x="2" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.6"/><rect x="11" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.6"/><rect x="2" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.6"/><rect x="11" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.6"/></svg>
          대시보드
        </button>
        <button class="nav-item" data-view="actions">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none"><path d="M4 10l4 4 8-8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          액션 / 약속
        </button>
        <button class="nav-item" data-view="companies">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none"><path d="M3 17V7l7-4 7 4v10H3z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><rect x="8" y="12" width="4" height="5" rx="0.5" stroke="currentColor" stroke-width="1.4"/></svg>
          고객사
        </button>
        <button class="nav-item" data-view="upload">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none"><path d="M10 13V4M7 7l3-3 3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 14v2a1 1 0 001 1h10a1 1 0 001-1v-2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
          미팅 업로드
        </button>
        <button class="nav-item" data-view="meetings">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none"><path d="M4 4h12a1 1 0 011 1v8a1 1 0 01-1 1H7l-3 3V5a1 1 0 011-1z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
          미팅 요약
        </button>

        <button class="nav-item" data-view="calendar">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none"><rect x="3" y="3" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M3 8h14" stroke="currentColor" stroke-width="1.4"/><path d="M7 5V3M13 5V3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          캘린더
        </button>

        <div class="nav-section-label" style="margin-top:8px">분석</div>
        <button class="nav-item" data-view="candidates">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none"><rect x="3" y="3" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M7 10h6M10 7v6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
          일정 후보
        </button>
        <button class="nav-item" data-view="search">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none"><circle cx="9" cy="9" r="5" stroke="currentColor" stroke-width="1.6"/><path d="M13 13l3 3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
          통합 검색
        </button>
        <button class="nav-item" data-view="risk">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none"><path d="M10 3L18 17H2L10 3z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M10 9v3M10 14.5v.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
          리스크 / 설정
        </button>
      </nav>

      <div class="sidebar-footer">
        <a class="sidebar-footer-link" href="/mobile/" style="display:none">
          <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><rect x="3" y="3" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M3 8h14" stroke="currentColor" stroke-width="1.4"/><path d="M7 5V3M13 5V3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          캘린더 앱
        </a>
      </div>
    </aside>

    <!-- 모바일 오버레이 -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- ── 메인 영역 ── -->
    <div class="main-wrap">
      <header class="topbar">
        <button class="hamburger" id="hamburger" aria-label="메뉴">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        </button>
        <span class="page-title" id="pageTitle">대시보드</span>
        <div style="width:32px"></div><!-- balance -->
      </header>

      <main class="content">

        <!-- 대시보드 -->
        <section id="viewDashboard" class="view">
          <section id="metrics" class="metrics"></section>
          <section class="section-intro">
            <strong>오늘 실행 보드</strong>
            <span>일정, 마감 액션, 확인 약속을 우선순위대로 확인합니다.</span>
          </section>
          <section class="grid">
            <article class="panel">
              <h2>오늘 일정</h2>
              <div id="todaySchedules" class="list"></div>
            </article>
            <article class="panel">
              <h2>7일 내 일정</h2>
              <div id="weekSchedules" class="list"></div>
            </article>
            <article class="panel">
              <h2>마감 액션</h2>
              <div id="dashboardActions" class="list"></div>
            </article>
            <article class="panel">
              <h2>확인할 약속</h2>
              <div id="dashboardPromises" class="list"></div>
            </article>
          </section>
          <section class="panel">
            <h2>최근 미팅</h2>
            <div id="meetings" class="list"></div>
          </section>
        </section>

        <!-- 액션/약속 -->
        <section id="viewActions" class="view hidden">
          <section class="panel">
            <div class="panel-head">
              <div>
                <h2>액션아이템</h2>
                <p>해야 할 일, 담당자, 기한을 한 번에 관리합니다.</p>
              </div>
              <button id="newActionBtn" class="small-primary">추가</button>
            </div>
            <div class="filters">
              <select id="actionStatus"></select>
              <select id="actionCompany"></select>
              <input id="actionAssignee" placeholder="담당자 검색" />
            </div>
            <form id="actionForm" class="edit-form hidden"></form>
            <div id="actionList" class="list"></div>
          </section>
          <section class="panel" style="margin-top:14px">
            <div class="panel-head">
              <div>
                <h2>약속사항</h2>
                <p>고객과 주고받은 약속, 확인 필요 항목을 추적합니다.</p>
              </div>
              <button id="newPromiseBtn" class="small-primary">추가</button>
            </div>
            <div class="filters">
              <select id="promiseStatus"></select>
              <select id="promiseCompany"></select>
            </div>
            <form id="promiseForm" class="edit-form hidden"></form>
            <div id="promiseList" class="list"></div>
          </section>
        </section>

        <!-- 고객사 -->
        <section id="viewCompanies" class="view hidden">
          <section class="panel">
            <div class="panel-head">
              <h2>고객사 관리</h2>
              <button id="newCompanyBtn" class="small-primary">신규 등록</button>
            </div>
            <div class="filters">
              <input id="companySearch" placeholder="고객사/담당자 검색" />
              <select id="companyTypeFilter"></select>
              <select id="companyStageFilter"></select>
              <select id="companyRiskFilter"></select>
            </div>
            <form id="companyForm" class="edit-form hidden"></form>
            <div class="split">
              <div id="companyList" class="list"></div>
              <div id="companyDetail" class="detail-box"></div>
            </div>
          </section>
        </section>

        <!-- 일정 후보 -->
        <section id="viewCandidates" class="view hidden">
          <section class="panel">
            <div class="panel-head">
              <h2>AI 일정 후보 승인함</h2>
              <select id="candidateState">
                <option value="pending">대기</option>
                <option value="saved">저장됨</option>
                <option value="ignored">무시됨</option>
                <option value="all">전체</option>
              </select>
            </div>
            <div id="candidateList" class="list"></div>
          </section>
        </section>

        <!-- 미팅 요약 -->
        <section id="viewMeetings" class="view hidden">
          <section class="panel">
            <div class="panel-head">
              <h2>미팅 요약 결과</h2>
            </div>
            <div class="filters">
              <input id="meetingSearch" placeholder="회의록/요약 검색" />
              <select id="meetingCompany"></select>
            </div>
            <div class="split">
              <div id="meetingList" class="list"></div>
              <div id="meetingDetail" class="detail-box"></div>
            </div>
          </section>
        </section>

        <!-- 미팅 업로드 -->
        <section id="viewUpload" class="view hidden">
          <section class="panel">
            <div class="panel-head">
              <h2>미팅 업로드 / AI 분석</h2>
            </div>
            <form id="uploadForm" class="upload-form">
              <select name="company_id" id="uploadCompany" required></select>
              <input name="meeting_date" type="date" required />
              <select name="meeting_type">
                <option value="방문">방문</option>
                <option value="전화">전화</option>
                <option value="온라인">온라인</option>
                <option value="기타">기타</option>
              </select>
              <input name="attendees" placeholder="참석자" />
              <input name="file" type="file" accept=".txt,text/plain" />
              <textarea name="transcript" class="wide-field" placeholder="TXT 파일을 올리거나 회의록 원문을 직접 붙여넣으세요."></textarea>
              <textarea name="memo" class="wide-field" placeholder="메모 / 특이사항"></textarea>
              <label class="check">
                <input name="run_ai" type="checkbox" checked />
                저장 후 AI 분석 실행
              </label>
              <div class="form-actions">
                <button type="submit" class="small-primary">저장 및 분석</button>
                <button type="button" id="clearUploadBtn">초기화</button>
              </div>
            </form>
            <div id="uploadResult" class="notice"></div>
          </section>
        </section>

        <!-- 통합 검색 -->
        <section id="viewSearch" class="view hidden">
          <section class="panel">
            <div class="panel-head">
              <h2>통합 검색</h2>
            </div>
            <form id="searchForm" class="search-form">
              <input id="searchInput" placeholder="고객사, 담당자, 회의록, 일정, 액션 검색" />
              <button type="submit" class="small-primary">검색</button>
            </form>
            <div id="searchResults" class="search-results"></div>
          </section>
        </section>

        <!-- 리스크/설정 -->
        <section id="viewRisk" class="view hidden">
          <section class="panel">
            <div class="panel-head">
              <h2>리스크 분석</h2>
              <select id="riskCompany"></select>
            </div>
            <div id="riskScoreboard" class="risk-grid"></div>
            <div id="riskDetail" class="detail-box"></div>
          </section>
          <section class="panel" style="margin-top:14px">
            <div class="panel-head">
              <h2>텔레그램 설정</h2>
            </div>
            <div id="telegramStatus" class="notice"></div>
            <div class="button-grid">
              <button data-telegram-action="test">테스트 메시지</button>
              <button data-telegram-action="check-reminders">지금 알림 체크</button>
              <button data-telegram-action="daily-digest">오늘 브리핑 발송</button>
              <button data-telegram-action="weekly-summary">주간 요약 발송</button>
            </div>
            <p id="telegramResult" class="meta"></p>
          </section>
        </section>

        <!-- 캘린더 -->
        <section id="viewCalendar" class="view view-calendar hidden">
          <iframe id="calendarFrame" src="/mobile/" frameborder="0" class="calendar-frame"></iframe>
        </section>

        <p id="error" class="error"></p>
      </main>
    </div>
  </div>

  <script src="/mobile/workspace/static/app.js?v=20260625-actioncal2"></script>
</body>
</html>
