<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#ffffff" />
  <link rel="manifest" href="/mobile/static/manifest.webmanifest" />
  <link rel="stylesheet" href="/mobile/static/styles.css?v=20260626-weekend1" />
  <title>Sales Calendar</title>
</head>
<body>
  <main id="app">
    <section id="login" class="screen login-screen">
      <form id="loginForm" autocomplete="on">
        <h1>Sales Calendar</h1>
        <p>Sales Intelligence 일정과 미팅 기록을 모바일에서 확인합니다.</p>
        <label for="username">아이디</label>
        <input id="username" name="username" placeholder="아이디" value="admin" autocomplete="username" inputmode="text" />
        <label for="password">비밀번호</label>
        <input id="password" name="password" placeholder="비밀번호" type="password" autocomplete="current-password" />
        <button id="loginBtn" class="primary" type="submit">로그인</button>
        <p id="loginError" class="error"></p>
      </form>
    </section>

    <section id="calendar" class="screen hidden">
      <header class="month-header">
        <button id="prevMonth" class="icon-btn" aria-label="이전 달">‹</button>
        <button id="monthJump" class="month-title" aria-label="오늘로 이동"></button>
        <button id="nextMonth" class="icon-btn" aria-label="다음 달">›</button>
      </header>

      <section class="calendar-toolbar">
        <select id="companyFilter"></select>
        <button id="todayBtn" class="ghost-btn">오늘</button>
      </section>

      <div class="summary" id="monthSummary"></div>

      <div class="weekday-row">
        <span class="sunday">&#51068;</span><span>&#50900;</span><span>&#54868;</span><span>&#49688;</span><span>&#47785;</span><span>&#44552;</span><span class="saturday">&#53664;</span>
      </div>
      <div id="monthGrid" class="month-grid"></div>

      <section class="day-sheet">
        <div class="sheet-handle"></div>
        <div class="day-header">
          <div>
            <h2 id="dayTitle"></h2>
            <p id="daySubtitle"></p>
          </div>
          <button id="addBtn" class="round" aria-label="일정 추가">+</button>
        </div>
        <form id="quickAddForm" class="quick-add" autocomplete="off">
          <input id="quickTitle" placeholder="빠른 일정 입력  예: 오후 3시 고객 미팅" />
          <button type="submit">등록</button>
        </form>
        <div id="dayItems" class="day-items"></div>
      </section>

      <nav class="bottom-nav" aria-label="하단 메뉴">
        <button class="active" data-tab="calendar" type="button">캘린더</button>
        <button data-tab="list" type="button">목록</button>
        <button data-tab="alerts" type="button">알림</button>
        <button data-tab="more" type="button">더보기</button>
      </nav>
    </section>

    <section id="detail" class="screen hidden detail-screen">
      <header class="sub-header">
        <button class="back icon-link" data-target="calendar" aria-label="뒤로">←</button>
        <button class="icon-link" id="editFromDetail">수정</button>
      </header>
      <div id="detailContent"></div>
    </section>

    <section id="editor" class="screen hidden editor-screen">
      <header class="sub-header">
        <button class="back icon-link" data-target="calendar" aria-label="닫기">×</button>
        <button id="saveSchedule" class="save-link">저장</button>
      </header>

      <input id="scheduleTitle" class="title-input" placeholder="일정 제목" />

      <label class="toggle-row">
        <span>종일</span>
        <input id="allDay" type="checkbox" />
      </label>

      <div class="form-row">
        <span>시작</span>
        <input id="startDate" type="date" />
        <input id="startTime" type="time" value="09:00" />
      </div>
      <div id="startDateHint" class="date-hint"></div>
      <div class="form-row">
        <span>종료</span>
        <input id="endDate" type="date" />
        <input id="endTime" type="time" value="10:00" />
      </div>
      <div id="endDateHint" class="date-hint"></div>
      <div class="form-row static-row">
        <span>시간대</span>
        <strong>한국 표준시 (GMT+09:00)</strong>
      </div>

      <!-- 카테고리 -->
      <select id="scheduleCategory">
        <option value="">카테고리 없음</option>
      </select>

      <!-- 색상 (카테고리 없을 때 표시) -->
      <div id="colorRow">
        <select id="scheduleColor">
          <option value="#3B82F6">파랑</option>
          <option value="#14B8A6">청록</option>
          <option value="#22C55E">초록</option>
          <option value="#F59E0B">노랑</option>
          <option value="#EF4444">빨강</option>
          <option value="#A855F7">보라</option>
          <option value="#111827">검정</option>
        </select>
      </div>

      <!-- 반복 -->
      <div class="form-section-label">반복</div>
      <select id="recurType">
        <option value="">반복 안함</option>
        <option value="daily">매일</option>
        <option value="weekly">매주</option>
        <option value="monthly">매월</option>
        <option value="yearly">매년</option>
      </select>
      <div id="recurOptions" class="hidden">
        <div class="form-row">
          <span>간격</span>
          <input id="recurInterval" type="number" min="1" max="99" value="1" style="width:60px" />
          <span id="recurIntervalUnit">주</span>
        </div>
        <div id="recurDaysRow" class="hidden">
          <div class="weekday-row">
            <label class="weekday-btn"><input type="checkbox" value="0" class="recur-dow" /><span>월</span></label>
            <label class="weekday-btn"><input type="checkbox" value="1" class="recur-dow" /><span>화</span></label>
            <label class="weekday-btn"><input type="checkbox" value="2" class="recur-dow" /><span>수</span></label>
            <label class="weekday-btn"><input type="checkbox" value="3" class="recur-dow" /><span>목</span></label>
            <label class="weekday-btn"><input type="checkbox" value="4" class="recur-dow" /><span>금</span></label>
            <label class="weekday-btn"><input type="checkbox" value="5" class="recur-dow" /><span>토</span></label>
            <label class="weekday-btn"><input type="checkbox" value="6" class="recur-dow" /><span>일</span></label>
          </div>
        </div>
        <div class="form-row">
          <span>종료일</span>
          <input id="recurEndDate" type="date" placeholder="없음" />
        </div>
      </div>

      <!-- 텔레그램 알림 -->
      <div class="form-section-label">텔레그램 알림</div>
      <div class="remind-checks" id="remindChecks">
        <label class="remind-check-item"><input type="checkbox" class="remind-chk" value="10080" /><span>1주일 전</span></label>
        <label class="remind-check-item"><input type="checkbox" class="remind-chk" value="1440" /><span>1일 전</span></label>
        <label class="remind-check-item"><input type="checkbox" class="remind-chk" value="180" /><span>3시간 전</span></label>
        <label class="remind-check-item"><input type="checkbox" class="remind-chk" value="60" /><span>1시간 전</span></label>
        <label class="remind-check-item"><input type="checkbox" class="remind-chk" value="30" /><span>30분 전</span></label>
        <label class="remind-check-item"><input type="checkbox" class="remind-chk" value="10" /><span>10분 전</span></label>
        <label class="remind-check-item"><input type="checkbox" class="remind-chk" value="0" /><span>시작 시</span></label>
      </div>

      <select id="scheduleCompany"></select>
      <textarea id="scheduleDescription" placeholder="메모"></textarea>

      <button id="deleteSchedule" class="danger hidden">삭제</button>
      <p id="editorError" class="error"></p>
    </section>
  </main>
  <script src="/mobile/static/app.js?v=20260630-features1"></script>
</body>
</html>
